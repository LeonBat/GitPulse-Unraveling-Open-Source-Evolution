name: gitpulse_transformations
version: 1.0.0
config-version: 2
profile: gitpulse

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  gitpulse_transformations:
    +materialized: view
    +schema: transformations
    staging:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: analytics

vars:
  lookback_days: 90
