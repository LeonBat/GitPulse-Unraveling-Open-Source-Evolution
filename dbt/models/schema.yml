version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: github_archive
    tables:
      - name: raw_events
        description: Raw GitHub Archive events loaded from public BigQuery dataset
        columns:
          - name: id
            description: Unique event identifier
          - name: type
            description: Type of GitHub event (PushEvent, PullRequestEvent, etc.)
          - name: actor_login
            description: GitHub username of the actor
          - name: actor_id
            description: Numeric ID of the actor
          - name: repo_name
            description: Repository name (owner/repo format)
          - name: repo_id
            description: Numeric repository ID
          - name: created_at
            description: Timestamp when event occurred
      - name: _loaded_at
        description: Timestamp when event was loaded into BigQuery

models:
  - name: stg_github_events
    description: Cleaned and deduplicated staging layer for GitHub events
    columns:
      - name: event_id
        description: Unique event identifier
      - name: event_type
        description: Type of GitHub event
      - name: actor_login
        description: GitHub username
      - name: actor_id
        description: Numeric ID of the actor
      - name: repo_name
        description: Repository name
      - name: repo_id
        description: Numeric repository ID
      - name: created_at
        description: Timestamp when event occurred

  - name: most_active_repos
    description: Top 10 most active repositories by weighted activity score
    columns:
      - name: metric_date
        description: Date of the metric calculation
      - name: repo_name
        description: Repository name
      - name: repo_id
        description: Numeric repository ID
      - name: forks_7d
        description: Number of fork events in past 7 days
      - name: issues_7d
        description: Number of issues events in past 7 days
      - name: pulls_7d
        description: Number of pull request events in past 7 days
      - name: pushes_7d
        description: Number of push events in past 7 days
      - name: total_activities_7d
        description: Total events in past 7 days
      - name: weighted_activity_score
        description: Weighted activity score (Forks×5 + Issues×3 + Pulls×4 + Pushes×1)
      - name: activity_rank
        description: Rank of repository by activity score (1 = most active)

  - name: human_vs_bot_activity
    description: Daily breakdown of human vs bot contributions on GitHub
    columns:
      - name: activity_date
        description: Date of activity
      - name: contributor_type
        description: 'Either "human" or "bot"'
      - name: event_count
        description: Total number of events by contributor type
      - name: unique_contributors
        description: Number of unique contributors of this type
